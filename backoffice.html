<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Back-office - Mise à jour de la carte</title>

<style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:20px; }
    h1 { color:#2c5f2d; }
    .card { background:white; padding:20px; margin:20px auto; max-width:900px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1); }
    .upload { border:2px dashed #2c5f2d; padding:40px; text-align:center; border-radius:10px; cursor:pointer; background:#f8fff8; }
    .btn { padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
    .btn-primary { background:#2c5f2d; color:white; }
    .btn-danger { background:#c0392b; color:white; }
    .btn-blue { background:#2980b9; color:white; }
    .progress { width:100%; background:#ddd; border-radius:5px; margin-top:10px; display:none; }
    .progress-bar { height:20px; background:#2c5f2d; width:0%; border-radius:5px; color:white; text-align:center; font-size:12px; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th,td { padding:10px; border-bottom:1px solid #ccc; }
    th { background:#2c5f2d; color:white; }
    .hidden { display:none; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<h1>🎛️ Mise à jour de la carte – Backoffice autonome</h1>

<div class="card">
    <h2>📥 Importer votre fichier Excel</h2>

    <div class="upload" id="dropZone">
        Cliquez ou glissez-déposez votre fichier Excel ici<br><br>
        <strong>.xlsx ou .xls</strong>
        <input type="file" id="fileInput" accept=".xlsx,.xls" class="hidden">
    </div>

    <div id="fileInfo" class="hidden">
        <p><strong>Fichier sélectionné :</strong> <span id="fileName"></span></p>
        <button class="btn btn-primary" onclick="processFile()">📄 Importer</button>
        <button class="btn btn-danger" onclick="resetSelection()">❌ Retirer</button>
    </div>

    <div class="progress" id="progressContainer">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>
</div>

<div class="card">
    <h2>📊 Aperçu des données</h2>
    <table>
        <thead>
            <tr>
                <th>Lieu</th><th>Département</th><th>Date</th><th>Type</th><th>Syndicat</th>
            </tr>
        </thead>
        <tbody id="previewTable">
            <tr><td colspan="5" style="text-align:center;color:#777;">Aucune donnée</td></tr>
        </tbody>
    </table>

    <button id="btnDownload" class="btn btn-blue hidden" onclick="downloadJSON()">💾 Télécharger data.json</button>
</div>

<script>
let selectedFile = null;
let parsedData = [];

/* ------------------------------
   GESTION DU DRAG & DROP
-------------------------------- */
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.style.background="#e9ffe9"; });
dropZone.addEventListener("dragleave", () => dropZone.style.background="#f8fff8");
dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.style.background="#f8fff8";
    handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener("change", () => handleFile(fileInput.files[0]));

/* ------------------------------
   VALIDATION ET LECTURE DU FICHIER
-------------------------------- */
function handleFile(file) {
    if (!file.name.match(/\.(xlsx|xls)$/)) {
        alert("Veuillez sélectionner un fichier Excel valide");
        return;
    }
    selectedFile = file;
    document.getElementById("fileInfo").classList.remove("hidden");
    document.getElementById("fileName").textContent = file.name;
}

function resetSelection() {
    selectedFile = null;
    fileInput.value = "";
    document.getElementById("fileInfo").classList.add("hidden");
}

/* ------------------------------
   TRAITEMENT DU FICHIER
-------------------------------- */
async function processFile() {
    if (!selectedFile) return;

    document.getElementById("progressContainer").style.display = "block";

    const reader = new FileReader();
    reader.onload = async e => {
        const workbook = XLSX.read(new Uint8Array(e.target.result), { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);

        // Vérifier les colonnes obligatoires
        const required = ["lieu","dept","date","type","syndicat"];
        for (let col of required) if (!(col in rows[0])) return alert("Colonne manquante : " + col);

        // Géocodage automatique
        parsedData = await geocodeRows(rows);

        // Mise à jour prévisualisation
        updatePreview();

        document.getElementById("btnDownload").classList.remove("hidden");
        alert("Import et géocodage terminés !");
    };

    reader.readAsArrayBuffer(selectedFile);
}

/* ------------------------------
   GÉOCODAGE API ADRESSE
-------------------------------- */
async function geocodeRows(rows) {
    let out = [];
    let i = 0;

    for (let row of rows) {
        updateProgress(Math.round((i/rows.length)*100));

        const q = `${row.lieu} ${row.dept}`.replace(/\s+/g,"+");
        let lat=null, lon=null;

        try {
            const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${q}&limit=1`);
            const j = await r.json();
            if (j.features?.length > 0) {
                lon = j.features[0].geometry.coordinates[0];
                lat = j.features[0].geometry.coordinates[1];
            }
        } catch(e){}

        out.push({
            ...row,
            lat: lat,
            lon: lon,
            dateSort: row.dateSort || row.date
        });

        await new Promise(r => setTimeout(r, 200));
        i++;
    }

    updateProgress(100);
    return out;
}

/* ------------------------------
   PRÉVISUALISATION
-------------------------------- */
function updatePreview() {
    const tbody = document.getElementById("previewTable");
    tbody.innerHTML = "";

    parsedData.slice(0,15).forEach(m => {
        tbody.innerHTML += `
            <tr>
                <td>${m.lieu}</td>
                <td>${m.dept}</td>
                <td>${m.date}</td>
                <td>${m.type}</td>
                <td>${m.syndicat}</td>
            </tr>`;
    });

    if (parsedData.length > 15)
        tbody.innerHTML += `<tr><td colspan="5" style="text-align:center;color:#777;">…</td></tr>`;
}

/* ------------------------------
   EXPORT JSON
-------------------------------- */
function downloadJSON() {
    const blob = new Blob([JSON.stringify(parsedData, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "data.json";
    a.click();
}

/* ------------------------------
   PROGRESSION
-------------------------------- */
function updateProgress(val) {
    const bar = document.getElementById("progressBar");
    bar.style.width = val+"%";
    bar.textContent = val+"%";
}

</script>
</body>
</html>
